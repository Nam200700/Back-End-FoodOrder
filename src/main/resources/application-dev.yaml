spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fresh_delivery?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Ho_Chi_Minh&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update      # schema is owned by Flyway (db/migration)
    show-sql: true
    properties:
      hibernate.format_sql: true

logging:
  level:
    org.example.datn: DEBUG
