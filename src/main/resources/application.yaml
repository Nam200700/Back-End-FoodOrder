spring:
  application:
    name: DATN
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    properties:
      hibernate.format_sql: true
      # Pin the dialect so `validate` matches the Flyway DDL (generated with the
      # same dialect). Avoids MySQL version-detection drift.
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  # Google OAuth2 — uncomment and set GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET to enable.
  # When this block is absent, no ClientRegistrationRepository bean is created and
  # OAuth2 login stays disabled (the app still starts normally).
  #  security:
  #    oauth2:
  #      client:
  #        registration:
  #          google:
  #            client-id: ${GOOGLE_CLIENT_ID}
  #            client-secret: ${GOOGLE_CLIENT_SECRET}
  #            scope: email, profile

server:
  port: 8080

app:
  oauth2:
    # Success handler redirects here with ?token=...&refreshToken=...
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}
  jwt:
    # Minimum 32 chars (256-bit) for HS256
    secret: ${JWT_SECRET:antigravity-food-dev-secret-key-change-me-256bit}
    access-token-expiry: 900000        # 15 minutes (ms)
    refresh-token-expiry: 604800000    # 7 days (ms)
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://app.antigravity.vn}
  shipping:
    base-fee: 15000        # VND for first 2km
    base-km: 2.0
    per-km-fee: 5000       # VND per extra km
    max-distance-km: 10.0
  otp:
    length: 6
    ttl-minutes: 5
    max-fail-attempts: 3
    lockout-minutes: 10
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment/result}
    ipn-url: ${VNPAY_IPN_URL:http://localhost:8080/api/v1/payments/vnpay/ipn}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
